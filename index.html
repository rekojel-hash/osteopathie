<script type="text/babel" data-presets="react">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ─── BARÈME KILOMÉTRIQUE FISCAL 2024 ─────────────────────────────────────────
const BAREME_KM = [
  { cv:3, t1:0.529, t2:{a:0.316,b:1065}, t3:0.370 },
  { cv:4, t1:0.606, t2:{a:0.340,b:1330}, t3:0.407 },
  { cv:5, t1:0.636, t2:{a:0.357,b:1395}, t3:0.427 },
  { cv:6, t1:0.665, t2:{a:0.374,b:1457}, t3:0.447 },
  { cv:7, t1:0.697, t2:{a:0.394,b:1515}, t3:0.470 },
];
function calcBareme(km, cv) {
  const b = BAREME_KM.find(r => r.cv === cv) || BAREME_KM[2];
  if (km <= 5000)  return km * b.t1;
  if (km <= 20000) return km * b.t2.a + b.t2.b;
  return km * b.t3;
}
function getMonthKm(dailyKm, mi) {
  return Object.values(dailyKm[mi] || {}).reduce((a, b) => a + Number(b), 0);
}
function buildKmTotals(dailyKm, s, mode) {
  if (!s.actif) return Array(12).fill(0);
  let cum = 0;
  return Array.from({ length: 12 }, (_, mi) => {
    const mk = getMonthKm(dailyKm, mi);
    if (mk === 0) return 0;
    if (mode === "reel") return (mk * s.conso / 100) * s.prixL;
    const before = calcBareme(cum, s.cv);
    cum += mk;
    return calcBareme(cum, s.cv) - before;
  });
}
function buildLaundryTotals(dailyTowels, dailyLaundry, s) {
  if (!s.actif) return Array(12).fill(0);
  return Array.from({ length: 12 }, (_, mi) => {
    let cost = 0;
    if (s.mode === "serviette" || s.mode === "both") {
      const nb = Object.values(dailyTowels[mi] || {}).reduce((a, b) => a + Number(b), 0);
      cost += nb * s.coutServiette * (s.quotePart / 100);
    }
    if (s.mode === "lessive" || s.mode === "both") {
      const nb = Object.values(dailyLaundry[mi] || {}).reduce((a, b) => a + Number(b), 0);
      cost += nb * s.coutLessive * (s.quotePart / 100);
    }
    return cost;
  });
}

  { id:"domicile",    label:"Consultation à domicile",      tarif:90,  color:"#E4C8A8", icon:"🏠" },
  { id:"entreprise",  label:"Intervention entreprise",      tarif:100, color:"#A8E4C8", icon:"🏢" },
  { id:"mutuelle",    label:"Remboursement mutuelle",       tarif:0,   color:"#C8E4A8", icon:"🏥" },
  { id:"formation",   label:"Formation dispensée",          tarif:0,   color:"#E4A8C8", icon:"🎓" },
  { id:"vacation",    label:"Vacation (clinique/EHPAD…)",   tarif:0,   color:"#A8A8E4", icon:"🏨" },
  { id:"souslocation",label:"Sous-location cabinet",        tarif:0,   color:"#C8C8A8", icon:"🔑" },
  { id:"autre",       label:"Autre recette",                tarif:0,   color:"#8A8A8A", icon:"➕" },
];

function buildMonthRevenue(dailyRevenue, mi) {
  // Retourne { total, nbPatients, byType: {typeId: montant}, lines }
  let total = 0, nbPatients = 0;
  const byType = {};
  const days = dailyRevenue[mi] || {};
  Object.values(days).forEach(d => {
    if (!d) return;
    // Saisie rapide
    if (d.quick && d.quick.nb > 0) {
      const amt = d.quick.nb * (d.quick.tarif || 0);
      total += amt;
      nbPatients += d.quick.nb;
      byType["adulte"] = (byType["adulte"] || 0) + amt;
    }
    // Lignes détaillées
    if (d.lines) {
      d.lines.forEach(l => {
        total += Number(l.montant) || 0;
        byType[l.typeId] = (byType[l.typeId] || 0) + (Number(l.montant) || 0);
        if (["adulte","pediatrique","sportive","domicile"].includes(l.typeId)) {
          nbPatients++;
        }
      });
    }
  });
  return { total, nbPatients, byType };
}

function buildInitialCharges() {
  const v = {};
  CATEGORIES.forEach(cat => cat.charges.forEach(c => {
    v[c.id] = { amount: c.default, freq: c.freq, enabled: c.default > 0 };
  }));
  return v;
}

const DEFAULT_STATE = {
  charges:          buildInitialCharges(),
  monthlyOverrides: {},
  dailyKm:          {},
  dailyTowels:      {},
  dailyLaundry:     {},
  dailyRevenue:     {},          // NOUVEAU
  revenueTypes:     DEFAULT_REVENUE_TYPES, // NOUVEAU — personnalisables
  kmSettings:       { actif:true, cv:5, prixL:1.85, conso:6.5 },

// ─── PERSISTANCE ─────────────────────────────────────────────────────────────
async function storageSave(data) {
  const json = JSON.stringify(data);
  try { if (window.storage) { const r = await window.storage.set(STORAGE_KEY, json); if (r) return true; } } catch(_) {}
  try { localStorage.setItem(STORAGE_KEY, json); return true; } catch(_) {}
  return false;
}
async function storageLoad() {
  try { if (window.storage) { const r = await window.storage.get(STORAGE_KEY); if (r) return JSON.parse(r.value); } } catch(_) {}
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(_) {}
  return null;
}
async function storageClear() {
  try { if (window.storage) await window.storage.delete(STORAGE_KEY); } catch(_) {}
  try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
}

// ─── DOWNLOAD ────────────────────────────────────────────────────────────────
function dlFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function buildChargeRows(st, kmT, laT, start, end) {
  const sel = Array.from({ length: end - start + 1 }, (_, i) => start + i);
  const rows = [];
  CATEGORIES.forEach(cat => cat.charges.forEach(ch => {
    const v = st.charges[ch.id];
    if (!v || !v.enabled) return;
    const row = { cat:cat.label, label:ch.label, freq:v.freq==="monthly"?"Mensuel":"Annuel", ref:v.amount };
    sel.forEach(mi => {
      let val;
      if (ch.id === "km_pro")                                  val = kmT[mi] || 0;
      else if (st.monthlyOverrides[ch.id]?.[mi] !== undefined) val = st.monthlyOverrides[ch.id][mi];
      else                                                      val = v.freq==="monthly" ? v.amount : v.amount/12;
      row["m"+mi] = Math.round(val*100)/100;
    });
    row.total = sel.reduce((a, mi) => a + (row["m"+mi]||0), 0);
    rows.push(row);
  }));
  if (laT.some(x => x > 0)) {
    const row = { cat:"Matériel & consommables", label:"Lessives / serviettes (quote-part pro)", freq:"Calculé", ref:0 };
    sel.forEach(mi => { row["m"+mi] = Math.round((laT[mi]||0)*100)/100; });
    row.total = sel.reduce((a,mi) => a+(row["m"+mi]||0), 0);
    rows.push(row);
  }
  return rows;
}

function exportCSV(st, kmMode, start, end) {
  const kmT  = buildKmTotals(st.dailyKm, st.kmSettings, kmMode);
  const laT  = buildLaundryTotals(st.dailyTowels, st.dailyLaundry, st.laundrySettings);
  const rows = buildChargeRows(st, kmT, laT, start, end);
  const sel  = Array.from({ length:end-start+1 }, (_, i) => start+i);
  const hdrs = ["Catégorie","Charge","Fréquence","Réf (€)",...sel.map(i=>MFULL[i]),"Total (€)"];
  const meta = ["# Charges cabinet ostéopathie","# Praticien : "+(st.praticien||"—"),"# Période : "+MFULL[start]+" – "+MFULL[end]+" "+st.workYear,"# Généré le : "+new Date().toLocaleDateString("fr-FR"),""].join("\n");
  const csvRows = rows.map(r => ['"'+r.cat+'"','"'+r.label+'"','"'+r.freq+'"',fn2(r.ref),...sel.map(i=>fn2(r["m"+i]||0)),fn2(r.total)].join(";"));
  const grand = rows.reduce((a,r) => a+r.total, 0);
  // Recettes
  const revRows = sel.map(mi => {
    const rev = buildMonthRevenue(st.dailyRevenue, mi);
    return `"Recettes";"CA ${MFULL[mi]}";"Réel";;${fn2(rev.total)}`;
  });
  const fname = "charges_"+(st.praticien?st.praticien.replace(/\s+/g,"_")+"_":"")+M3[start]+"-"+M3[end]+"_"+st.workYear+".csv";
  dlFile("\uFEFF"+meta+hdrs.join(";")+"\n"+csvRows.join("\n")+"\n\n# RECETTES\n"+revRows.join("\n")+"\n\n# TOTAL CHARGES;"+fn2(grand)+" €", fname, "text/csv;charset=utf-8;");
}

function exportFullBackup(st) {
  const payload = { ...st, _version:"5.0", _savedAt:new Date().toISOString(), _app:"osteo_charges" };
  const d = new Date().toISOString().slice(0,10);
  dlFile(JSON.stringify(payload,null,2), "BACKUP_osteo_"+(st.praticien?st.praticien.replace(/\s+/g,"_")+"_":"")+st.workYear+"_"+d+".json", "application/json");
}

// ─── COMPOSANT GRILLE JOURNALIÈRE ─────────────────────────────────────────────
function DayGrid({ mi, data, onSet, unit, color, isFloat }) {
  const days     = DAYS_IN_MONTH[mi];
  const total    = Object.values(data[mi]||{}).reduce((a,b)=>a+Number(b),0);
  const firstDow = new Date(NOW_Y, mi, 1).getDay();
  const offset   = firstDow === 0 ? 6 : firstDow - 1;
  function handleChange(day, rawVal) {
    const val = rawVal==="" ? 0 : (isFloat ? parseFloat(rawVal) : parseInt(rawVal,10));
    onSet(mi, day, isNaN(val) ? 0 : val);
  }
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
        {["Lu","Ma","Me","Je","Ve","Sa","Di"].map(d=>(
          <div key={d} style={{ textAlign:"center", fontSize:9, color:"#3A5A6A", fontWeight:600 }}>{d}</div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
        {Array.from({ length: offset }, (_,i) => <div key={"e"+i} />)}
        {Array.from({ length: days }, (_,i) => i+1).map(day => {
          const raw    = data[mi]?.[day];
          const hasVal = raw !== undefined && Number(raw) > 0;
          return (
            <div key={day} style={{ textAlign:"center" }}>
              <div style={{ fontSize:8, color:"#2A4A5A", marginBottom:1 }}>{day}</div>
              <input type="number" min={0} step={isFloat?0.1:1} value={hasVal ? raw : ""}
                onChange={e => handleChange(day, e.target.value)}
                style={{ width:"100%", boxSizing:"border-box", background:hasVal?"#0D1E2A":"#090F14", border:"1px solid "+(hasVal?color:"#1A2530"), color:hasVal?color:"#1E3040", borderRadius:3, padding:"3px 1px", fontSize:10, textAlign:"center", fontFamily:"Georgia,serif", outline:"none" }}
              />
            </div>
          );
        })}
      </div>
      <div style={{ marginTop:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>

// ─── COMPOSANT BARCHART ───────────────────────────────────────────────────────
function BarChart({ data, labels, color, onClick, highlightIdx }) {
  const max   = Math.max(...data, 1);
  const BAR_H = 110;
  return (
    <div style={{ display:"flex", alignItems:"stretch", gap:3 }}>
      {data.map((val, i) => {
        const barH = Math.max(Math.round((val / max) * BAR_H), 2);
        const isHi = i === highlightIdx;
        const bg   = isHi ? "linear-gradient(180deg,#7EC8A4,#5BA882)" : (color || "linear-gradient(180deg,#2A5070,#1A3A50)");
        return (
          <div key={i} onClick={() => onClick && onClick(i)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", cursor:onClick?"pointer":"default" }}>
            <div style={{ height:20, display:"flex", alignItems:"flex-end", justifyContent:"center", width:"100%", paddingBottom:2 }}>
              <span style={{ fontSize:7, color:isHi?"#7EC8A4":"#4A7A9B", textAlign:"center" }}>{fe(val)}</span>
            </div>
            <div style={{ height:BAR_H, display:"flex", flexDirection:"column", justifyContent:"flex-end", width:"100%" }}>
              <div style={{ width:"100%", height:barH+"px", background:bg, borderRadius:"3px 3px 0 0", transition:"height 0.4s ease" }}/>
            </div>
            <div style={{ height:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ fontSize:8, color:isHi?"#7EC8A4":"#4A7A9B" }}>{labels[i]}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── COMPOSANT LINECHART ──────────────────────────────────────────────────────
function LineChart({ datasets, labels }) {
  // datasets = [{label, color, data:[...12 values]}]
  const W = 100, H = 80;
  const allVals = datasets.flatMap(d => d.data).filter(v => v > 0);
  const maxV = Math.max(...allVals, 1);
  const minV = 0;
  const range = maxV - minV || 1;
  const pts = (data) => data.map((v, i) => {
    const x = (i / (data.length - 1)) * W;
    const y = H - ((v - minV) / range) * H;
    return [x, y];
  });
  return (
    <div style={{ position:"relative", overflowX:"auto" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:120, display:"block" }} preserveAspectRatio="none">
        {datasets.map((ds, di) => {
          const points = pts(ds.data);
          const path   = points.map((p,i) => (i===0?"M":"L")+p[0].toFixed(2)+","+p[1].toFixed(2)).join(" ");
          const area   = path + " L"+W+","+H+" L0,"+H+" Z";
          return (
            <g key={di}>
              <path d={area} fill={ds.color} opacity={0.08}/>
              <path d={path} fill="none" stroke={ds.color} strokeWidth={0.8} strokeLinejoin="round"/>
              {points.map((p,i) => ds.data[i] > 0 && (
                <circle key={i} cx={p[0]} cy={p[1]} r={0.8} fill={ds.color}/>
              ))}
            </g>
          );
        })}
      </svg>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
        {labels.map((l,i) => <span key={i} style={{ fontSize:8, color:"#4A7A9B", flex:1, textAlign:"center" }}>{l}</span>)}
      </div>
      <div style={{ display:"flex", gap:14, marginTop:6, flexWrap:"wrap" }}>
        {datasets.map(ds => (
          <div key={ds.label} style={{ display:"flex", alignItems:"center", gap:4 }}>
            <div style={{ width:16, height:2, background:ds.color, borderRadius:1 }}/>
            <span style={{ fontSize:9, color:"#6B8EA8" }}>{ds.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── COMPOSANT SAISIE RECETTE JOURNALIÈRE ─────────────────────────────────────
function DayRevenueEditor({ day, mi, data, onChange, revenueTypes }) {
  const dayData = data[mi]?.[day] || { quick: { nb:0, tarif:70 }, lines:[] };
  const typeAdulte = revenueTypes.find(t => t.id === "adulte");
  const defaultTarif = typeAdulte ? typeAdulte.tarif : 70;

  function setQuick(field, val) {
    const next = { ...dayData, quick: { ...dayData.quick, [field]: val } };
    onChange(mi, day, next);
  }
  function addLine() {
    const next = { ...dayData, lines: [...(dayData.lines||[]), { typeId:"adulte", montant:defaultTarif, note:"" }] };
    onChange(mi, day, next);
  }
  function updateLine(idx, field, val) {
    const lines = [...(dayData.lines||[])];
    lines[idx] = { ...lines[idx], [field]: val };
    // Auto-remplir le tarif si changement de type
    if (field === "typeId") {
      const t = revenueTypes.find(r => r.id === val);
      if (t && t.tarif > 0) lines[idx].montant = t.tarif;
    }
    onChange(mi, day, { ...dayData, lines });
  }
  function removeLine(idx) {
    const lines = (dayData.lines||[]).filter((_,i) => i !== idx);
    onChange(mi, day, { ...dayData, lines });
  }
  const quickTotal = (dayData.quick?.nb||0) * (dayData.quick?.tarif||0);
  const linesTotal = (dayData.lines||[]).reduce((a,l) => a + Number(l.montant||0), 0);

  return (
    <div style={{ background:"#0A1520", border:"1px solid #1E2E3D", borderRadius:8, padding:"10px 12px", marginBottom:6 }}>
      <div style={{ fontSize:11, color:"#7EC8A4", fontWeight:600, marginBottom:8 }}>
        Jour {day} {MFULL[mi]}
      </div>

      {/* Saisie rapide */}
      <div style={{ background:"#0F1A28", borderRadius:6, padding:"8px 10px", marginBottom:8 }}>
        <div style={{ fontSize:9, color:"#4A7A9B", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>⚡ Saisie rapide</div>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}>
            <input type="number" min={0} value={dayData.quick?.nb||""} onChange={e=>setQuick("nb",Number(e.target.value))}
              style={{ background:"#0A1218", border:"1px solid #2A3845", color:"#E8E4DC", borderRadius:4, padding:"5px 6px", width:50, fontSize:12, textAlign:"center", fontFamily:"Georgia,serif" }}
              placeholder="0"
            />
            <span style={{ fontSize:11, color:"#6B8EA8" }}>patients ×</span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}>
            <input type="number" min={0} step={5} value={dayData.quick?.tarif||defaultTarif} onChange={e=>setQuick("tarif",Number(e.target.value))}
              style={{ background:"#0A1218", border:"1px solid #2A3845", color:"#C8A87E", borderRadius:4, padding:"5px 6px", width:60, fontSize:12, textAlign:"center", fontFamily:"Georgia,serif" }}
            />
            <span style={{ fontSize:11, color:"#6B8EA8" }}>€ = <strong style={{color:"#7EC8A4"}}>{fe2(quickTotal)}</strong></span>
          </div>
        </div>
      </div>

      {/* Lignes détaillées */}
      {(dayData.lines||[]).length > 0 && (
        <div style={{ marginBottom:8 }}>
          <div style={{ fontSize:9, color:"#4A7A9B", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>📋 Détail par acte</div>
          {(dayData.lines||[]).map((l, idx) => {
            const t = revenueTypes.find(r => r.id === l.typeId);
            return (
              <div key={idx} style={{ display:"flex", gap:6, alignItems:"center", marginBottom:4, flexWrap:"wrap" }}>
                <select value={l.typeId} onChange={e=>updateLine(idx,"typeId",e.target.value)}
                  style={{ background:"#0A1218", border:"1px solid #2A3845", color:t?.color||"#E8E4DC", borderRadius:4, padding:"4px 6px", fontSize:11, flex:2, minWidth:120, fontFamily:"Georgia,serif" }}>
                  {revenueTypes.map(rt => <option key={rt.id} value={rt.id}>{rt.icon} {rt.label}</option>)}
                </select>
                <input type="number" min={0} step={5} value={l.montant} onChange={e=>updateLine(idx,"montant",Number(e.target.value))}
                  style={{ background:"#0A1218", border:"1px solid #2A3845", color:"#7EC8A4", borderRadius:4, padding:"4px 6px", width:70, fontSize:11, textAlign:"right", fontFamily:"Georgia,serif" }}

// ─── GRILLE RECETTES ──────────────────────────────────────────────────────────
function RevenueGrid({ mi, dailyRevenue, onSet, revenueTypes }) {
  const [openDay, setOpenDay] = useState(null);
  const days     = DAYS_IN_MONTH[mi];
  const firstDow = new Date(NOW_Y, mi, 1).getDay();
  const offset   = firstDow === 0 ? 6 : firstDow - 1;
  const rev      = buildMonthRevenue(dailyRevenue, mi);

  function getDayTotal(day) {
    const d = dailyRevenue[mi]?.[day];
    if (!d) return 0;
    const q = (d.quick?.nb||0) * (d.quick?.tarif||0);
    const l = (d.lines||[]).reduce((a,x) => a + Number(x.montant||0), 0);
    return q + l;
  }

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
        {["Lu","Ma","Me","Je","Ve","Sa","Di"].map(d=>(
          <div key={d} style={{ textAlign:"center", fontSize:9, color:"#3A5A6A", fontWeight:600 }}>{d}</div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
        {Array.from({ length: offset }, (_,i) => <div key={"e"+i} />)}
        {Array.from({ length: days }, (_,i) => i+1).map(day => {
          const dayTotal = getDayTotal(day);
          const hasVal   = dayTotal > 0;
          const isOpen   = openDay === day;
          return (
            <div key={day} style={{ textAlign:"center" }}>
              <div style={{ fontSize:8, color:"#2A4A5A", marginBottom:1 }}>{day}</div>
              <button onClick={() => setOpenDay(isOpen ? null : day)} style={{
                width:"100%", background:hasVal?"#0D1E2A":"#090F14",
                border:"1px solid "+(isOpen?"#7EC8A4":hasVal?"#2D6A4F":"#1A2530"),
                color:hasVal?"#7EC8A4":"#1E3040",
                borderRadius:3, padding:"3px 1px", fontSize:9, cursor:"pointer",
                fontFamily:"Georgia,serif", textAlign:"center",
                minHeight:24,
              }}>
                {hasVal ? (dayTotal >= 1000 ? (dayTotal/1000).toFixed(1)+"k" : Math.round(dayTotal)) : "·"}
              </button>
            </div>
          );
        })}
      </div>

      {/* Éditeur du jour sélectionné */}
      {openDay && (
        <div style={{ marginTop:10 }}>
          <DayRevenueEditor day={openDay} mi={mi} data={dailyRevenue} onChange={onSet} revenueTypes={revenueTypes}/>
          <button onClick={()=>setOpenDay(null)} style={{ width:"100%", background:"none", border:"1px solid #1E2E3D", color:"#4A6A7A", borderRadius:6, padding:"6px", cursor:"pointer", fontSize:11, fontFamily:"Georgia,serif", marginTop:4 }}>
            ✓ Fermer
          </button>
        </div>
      )}

      <div style={{ marginTop:10, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
        <div style={{ background:"#0A1218", borderRadius:6, padding:"8px 10px" }}>
          <div style={{ fontSize:9, color:"#4A7A9B" }}>CA DU MOIS</div>
          <div style={{ fontSize:16, color:"#7EC8A4", fontWeight:600 }}>{fe(rev.total)}</div>
        </div>
        <div style={{ background:"#0A1218", borderRadius:6, padding:"8px 10px" }}>
          <div style={{ fontSize:9, color:"#4A7A9B" }}>PATIENTS</div>
          <div style={{ fontSize:16, color:"#A8C8E4" }}>{rev.nbPatients}</div>
        </div>
        <div style={{ background:"#0A1218", borderRadius:6, padding:"8px 10px" }}>
          <div style={{ fontSize:9, color:"#4A7A9B" }}>MOY./PATIENT</div>
          <div style={{ fontSize:16, color:"#C8A87E" }}>{rev.nbPatients > 0 ? fe(rev.total/rev.nbPatients) : "—"}</div>
        </div>
      </div>
    </div>
  );
}

// ─── APP PRINCIPALE ───────────────────────────────────────────────────────────
function App() {
  const [loading,    setLoading]    = useState(true);
  const [saveStatus, setSaveStatus] = useState("idle");
  const saveTimer    = useRef(null);
  const fileInputRef = useRef(null);
  const firstSave    = useRef(true);

  const [st, setSt] = useState(DEFAULT_STATE);

  const [view,             setView]             = useState("journal");
  const [journalMonth,     setJournalMonth]     = useState(NOW_M);
  const [selectedMonth,    setSelectedMonth]    = useState(NOW_M);
  const [expandedCat,      setExpandedCat]      = useState("social");
  const [exportPeriodType, setExportPeriodType] = useState("annual");
  const [exportKmMode,     setExportKmMode]     = useState("bareme");
  const [customStart,      setCustomStart]      = useState(0);
  const [customEnd,        setCustomEnd]        = useState(11);
  const [exportFeedback,   setExportFeedback]   = useState("");
  const [saveLoadMsg,      setSaveLoadMsg]      = useState("");
  const [saveLoadType,     setSaveLoadType]     = useState("ok");
  const [dashTab,          setDashTab]          = useState("global"); // global | ca | charges | tresorerie

  // ── Chargement initial ────────────────────────────────────────────────────
  useEffect(() => {
    storageLoad().then(saved => {
      if (saved && saved.charges) {
        setSt({
          ...DEFAULT_STATE, ...saved,
          charges:         { ...buildInitialCharges(), ...(saved.charges||{}) },
          kmSettings:      { ...DEFAULT_STATE.kmSettings,      ...(saved.kmSettings||{}) },
          laundrySettings: { ...DEFAULT_STATE.laundrySettings, ...(saved.laundrySettings||{}) },
          revenueTypes:    saved.revenueTypes || DEFAULT_REVENUE_TYPES,
          dailyRevenue:    saved.dailyRevenue || {},
        });
      }
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  // ── Sauvegarde auto ────────────────────────────────────────────────────────
  useEffect(() => {
    if (loading) return;
    if (firstSave.current) { firstSave.current = false; return; }
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSaveStatus("saving");
    saveTimer.current = setTimeout(async () => {
      const ok = await storageSave(st);
      setSaveStatus(ok ? "saved" : "error");
      setTimeout(() => setSaveStatus("idle"), 2500);
    }, 800);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [st, loading]);

  // ── Mutateurs ─────────────────────────────────────────────────────────────
  const upd        = useCallback(patch => setSt(p => {
    const next = { ...p, ...patch };
    if (patch.kmSettings !== undefined && patch.kmSettings.actif !== p.kmSettings.actif) {
      next.charges = { ...next.charges, km_pro: { ...next.charges.km_pro, enabled: patch.kmSettings.actif } };
    }
    return next;
  }), []);
  const updCharge   = useCallback((id,field,val) => setSt(p=>({...p,charges:{...p.charges,[id]:{...p.charges[id],[field]:val}}})),[]);
  const updOverride = useCallback((cid,mi,amt) => setSt(p=>({...p,monthlyOverrides:{...p.monthlyOverrides,[cid]:{...(p.monthlyOverrides[cid]||{}),[mi]:amt}}})),[]);
  const delOverride = useCallback((cid,mi) => setSt(p=>{ const n={...p.monthlyOverrides}; if(n[cid]){const m={...n[cid]};delete m[mi];n[cid]=m;} return {...p,monthlyOverrides:n}; }),[]);
  const setDayVal   = useCallback((key,mi,day,val) => setSt(p=>{
    if(day==="__clear__") return {...p,[key]:{...p[key],[mi]:{}}};
    const month={...(p[key][mi]||{})};
    if(!val||val===0) delete month[day]; else month[day]=val;
    return {...p,[key]:{...p[key],[mi]:month}};
  }),[]);
  const setDayKm      = useCallback((mi,day,val)=>setDayVal("dailyKm",mi,day,val),[setDayVal]);
  const setDayTowels  = useCallback((mi,day,val)=>setDayVal("dailyTowels",mi,day,val),[setDayVal]);
  const setDayLaundry = useCallback((mi,day,val)=>setDayVal("dailyLaundry",mi,day,val),[setDayVal]);
  const setDayRevenue = useCallback((mi,day,val) => setSt(p=>{
    const month = {...(p.dailyRevenue[mi]||{})};
    if(!val) delete month[day]; else month[day]=val;
    return {...p, dailyRevenue:{...p.dailyRevenue,[mi]:month}};
  }),[]);
  const updRevenueType = useCallback((id,field,val) => setSt(p=>({
    ...p, revenueTypes: p.revenueTypes.map(t => t.id===id ? {...t,[field]:val} : t)
  })),[]);

  // ── Calculs dérivés ───────────────────────────────────────────────────────
  const kmTotalsBareme = useMemo(()=>buildKmTotals(st.dailyKm,st.kmSettings,"bareme"),[st.dailyKm,st.kmSettings]);
  const kmTotalsReel   = useMemo(()=>buildKmTotals(st.dailyKm,st.kmSettings,"reel"),  [st.dailyKm,st.kmSettings]);
  const laundryTotals  = useMemo(()=>buildLaundryTotals(st.dailyTowels,st.dailyLaundry,st.laundrySettings),[st.dailyTowels,st.dailyLaundry,st.laundrySettings]);

  const getChargeAmt = useCallback((cid,mi)=>{
    const v = st.charges[cid];
    if(!v||!v.enabled) return 0;
    if(cid==="km_pro") return kmTotalsBareme[mi]||0;
    if(st.monthlyOverrides[cid]?.[mi]!==undefined) return st.monthlyOverrides[cid][mi];
    return v.freq==="monthly" ? v.amount : v.amount/12;
  },[st.charges,st.monthlyOverrides,kmTotalsBareme]);

  const monthCharges = useMemo(()=>Array.from({length:12},(_,mi)=>{
    let t = CATEGORIES.reduce((acc,cat)=>acc+cat.charges.reduce((a,c)=>a+getChargeAmt(c.id,mi),0),0);
    if(st.laundrySettings.actif) t += laundryTotals[mi]||0;
    return Math.round(t*100)/100;
  }),[getChargeAmt,laundryTotals,st.laundrySettings.actif]);

  const monthRevenues = useMemo(()=>Array.from({length:12},(_,mi)=>buildMonthRevenue(st.dailyRevenue,mi).total),[st.dailyRevenue]);
  const monthPatients = useMemo(()=>Array.from({length:12},(_,mi)=>buildMonthRevenue(st.dailyRevenue,mi).nbPatients),[st.dailyRevenue]);
  const monthBenef    = useMemo(()=>monthRevenues.map((r,i)=>r-monthCharges[i]),[monthRevenues,monthCharges]);

  const annualCharges  = useMemo(()=>monthCharges.reduce((a,b)=>a+b,0),[monthCharges]);
  const annualRevenues = useMemo(()=>monthRevenues.reduce((a,b)=>a+b,0),[monthRevenues]);
  const annualBenef    = annualRevenues - annualCharges;
  const annualPatients = useMemo(()=>monthPatients.reduce((a,b)=>a+b,0),[monthPatients]);

  const maxChargeMonth  = useMemo(()=>Math.max(...monthCharges,1),[monthCharges]);

  const [exS, exE] = useMemo(()=>{
    if(exportPeriodType==="annual")    return [0,11];
    if(exportPeriodType==="semester1") return [0,5];
    if(exportPeriodType==="semester2") return [6,11];
    return [customStart, customEnd];
  },[exportPeriodType,customStart,customEnd]);

  const monthKmVal    = getMonthKm(st.dailyKm, journalMonth);
  const monthTowelsV  = Object.values(st.dailyTowels[journalMonth]||{}).reduce((a,b)=>a+Number(b),0);
  const monthLaundryV = Object.values(st.dailyLaundry[journalMonth]||{}).reduce((a,b)=>a+Number(b),0);

  // ── Feedbacks ─────────────────────────────────────────────────────────────
  function trigFeedback(msg){ setExportFeedback(msg); setTimeout(()=>setExportFeedback(""),3500); }
  function trigSL(msg,type="ok"){ setSaveLoadMsg(msg); setSaveLoadType(type); setTimeout(()=>setSaveLoadMsg(""),5000); }

  // ── Import backup ──────────────────────────────────────────────────────────
  function handleLoadFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.charges) { trigSL("⚠ Fichier invalide.","err"); return; }
        const restored = {
          ...DEFAULT_STATE, ...data,
          charges:         { ...buildInitialCharges(), ...(data.charges||{}) },
          kmSettings:      { ...DEFAULT_STATE.kmSettings,      ...(data.kmSettings||{}) },
          laundrySettings: { ...DEFAULT_STATE.laundrySettings, ...(data.laundrySettings||{}) },
          revenueTypes:    data.revenueTypes || DEFAULT_REVENUE_TYPES,
          dailyRevenue:    data.dailyRevenue || {},
        };
        setSt(restored);
        await storageSave(restored);
        trigSL("✓ Données restaurées depuis : " + file.name);
      } catch(_) { trigSL("⚠ Impossible de lire ce fichier.","err"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  async function handleReset() {
    if (!window.confirm("Réinitialiser TOUTES les données ? Action irréversible.")) return;
    await storageClear();
    setSt(DEFAULT_STATE);
    trigSL("✓ Application réinitialisée.");
  }

  // ── Styles ────────────────────────────────────────────────────────────────
  const TAB  = a => ({ background:"none", border:"none", borderBottom:a?"2px solid #7EC8A4":"2px solid transparent", color:a?"#7EC8A4":"#6B8EA8", cursor:"pointer", padding:"10px 12px", fontSize:10, transition:"all 0.2s", fontFamily:"Georgia,serif", whiteSpace:"nowrap" });
  const PILL = a => ({ padding:"5px 11px", borderRadius:20, cursor:"pointer", fontSize:11, fontFamily:"Georgia,serif", background:a?"#7EC8A4":"#0A1520", color:a?"#0F1923":"#6B8EA8", border:a?"1px solid #7EC8A4":"1px solid #1E2E3D", fontWeight:a?700:400, transition:"all 0.15s" });
  const INP  = { background:"#0A1520", border:"1px solid #2A3845", color:"#E8E4DC", borderRadius:4, padding:"5px 8px", fontSize:12, fontFamily:"Georgia,serif" };
  const CARD = { background:"#121E2B", border:"1px solid #1E2E3D", borderRadius:10, padding:"14px 18px" };
  const BTN  = (col="#7EC8A4") => ({ background:"none", border:"1px solid "+col, color:col, borderRadius:6, padding:"8px 14px", cursor:"pointer", fontSize:12, fontFamily:"Georgia,serif", transition:"all 0.15s" });
  const SL   = { fontSize:11, letterSpacing:2, color:"#6B8EA8", textTransform:"uppercase", marginBottom:10 };
  const DTAB = a => ({ background:a?"#1A3A2A":"none", border:"none", borderRadius:6, color:a?"#7EC8A4":"#4A7A9B", cursor:"pointer", padding:"6px 12px", fontSize:11, fontFamily:"Georgia,serif" });

  if (loading) return (
    <div style={{ minHeight:"100vh", background:"#0F1923", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:14, color:"#6B8EA8", fontFamily:"Georgia,serif" }}>
      <div style={{ fontSize:32 }}>🩺</div>
      <div style={{ fontSize:13, letterSpacing:2 }}>Chargement…</div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:"#0F1923", color:"#E8E4DC", fontFamily:"'Georgia','Times New Roman',serif" }}>

      {/* ── HEADER ─────────────────────────────────────────────────────────── */}
      <div style={{ borderBottom:"1px solid #2A3845", padding:"10px 16px", background:"linear-gradient(135deg,#0F1923,#162230)", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:6 }}>
        <div>
          <div style={{ fontSize:9, letterSpacing:3, color:"#6B8EA8", textTransform:"uppercase" }}>Cabinet · {st.workYear}</div>
          <div style={{ fontSize:16, fontWeight:400, color:"#E8E4DC" }}>Osteopathie</div>
          <div style={{ fontSize:10, color:"#4A7A9B" }}>{st.praticien || "Praticien libéral"}</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:9, color:"#4A7A9B" }}>CA · Charges · Bénéfice</div>
          <div style={{ fontSize:13, color:"#7EC8A4" }}>{fe(annualRevenues)} · <span style={{color:"#E4A8A8"}}>{fe(annualCharges)}</span> · <span style={{color:annualBenef>=0?"#A8E4C8":"#E4A8A8"}}>{fe(annualBenef)}</span></div>
          <div style={{ fontSize:9, color:saveStatus==="saved"?"#7EC8A4":saveStatus==="saving"?"#C8A87E":saveStatus==="error"?"#E4A8A8":"transparent", transition:"color 0.4s" }}>
            {saveStatus==="saving"?"⏳ Sauvegarde…":saveStatus==="saved"?"✓ Sauvegardé":saveStatus==="error"?"⚠ Erreur":"·"}
          </div>
        </div>
      </div>

      {/* ── NAVIGATION ─────────────────────────────────────────────────────── */}
      <div style={{ display:"flex", borderBottom:"1px solid #1E2E3D", background:"#0F1923", overflowX:"auto" }}>
        {[
          {k:"journal",   l:"📓 Journal"},
          {k:"recettes",  l:"💰 Recettes"},
          {k:"monthly",   l:"📅 Charges"},
          {k:"config",    l:"⚙️ Config"},
          {k:"dashboard", l:"📊 Tableau"},
          {k:"export",    l:"📤 Export"},
          {k:"saveload",  l:"💾 Données"},
          {k:"soutenir",  l:"☕ Soutenir"},
        ].map(t=><button key={t.k} onClick={()=>setView(t.k)} style={TAB(view===t.k)}>{t.l}</button>)}
      </div>

      <div style={{ padding:"14px 16px", maxWidth:900, margin:"0 auto" }}>

        {/* ════════ JOURNAL QUOTIDIEN ══════════════════════════════════════════ */}
        {view === "journal" && (
          <div>
            <div style={{ display:"flex", gap:4, marginBottom:14, flexWrap:"wrap" }}>
              {M3.map((m,i)=><button key={i} onClick={()=>setJournalMonth(i)} style={PILL(journalMonth===i)}>{m}</button>)}
            </div>

            {!st.kmSettings.actif && !st.laundrySettings.actif && (
              <div style={{...CARD, textAlign:"center", padding:"32px 20px", borderColor:"#2A3845"}}>
                <div style={{ fontSize:32, marginBottom:12 }}>📓</div>
                <div style={{ fontSize:13, color:"#C8C4BC", marginBottom:8 }}>Journal — km & linge</div>
                <div style={{ fontSize:11, color:"#4A7A9B", marginBottom:16, lineHeight:1.8 }}>
                  Activez le module <strong style={{color:"#C8A87E"}}>Kilométrage</strong> et/ou <strong style={{color:"#7EA8C8"}}>Linge</strong> dans la configuration.
                </div>
                <button onClick={()=>setView("config")} style={{...BTN("#7EC8A4"), padding:"8px 18px"}}>⚙️ Configuration</button>
              </div>
            )}

            {(st.kmSettings.actif || st.laundrySettings.actif) && (
              <div style={{ display:"grid", gridTemplateColumns:(st.kmSettings.actif && st.laundrySettings.actif)?"1fr 1fr":"1fr", gap:8, marginBottom:12 }}>
                {st.kmSettings.actif && (
                  <div style={{...CARD, borderColor:"#2A3A26"}}>
                    <div style={{ fontSize:9, color:"#5A7A5A", textTransform:"uppercase", letterSpacing:1, marginBottom:4 }}>🚗 Km — {M3[journalMonth]}</div>
                    <div style={{ fontSize:18, color:"#C8A87E" }}>{monthKmVal.toLocaleString("fr-FR",{maximumFractionDigits:1})} km</div>
                    <div style={{ fontSize:10, color:"#4A7A9B" }}>Barème : {fe2(kmTotalsBareme[journalMonth])} · Réel : {fe2(kmTotalsReel[journalMonth])}</div>
                  </div>
                )}
                {st.laundrySettings.actif && (
                  <div style={{...CARD, borderColor:"#1E2E3A"}}>
                    <div style={{ fontSize:9, color:"#3A5A7A", textTransform:"uppercase", letterSpacing:1, marginBottom:4 }}>🧺 Linge — {M3[journalMonth]}</div>
                    <div style={{ fontSize:13, color:"#7EA8C8" }}>{monthTowelsV} serv. · {monthLaundryV} lav.</div>
                    <div style={{ fontSize:10, color:"#7EC8A4" }}>Part pro : {fe2(laundryTotals[journalMonth])}</div>
                  </div>
                )}
              </div>
            )}

            {st.kmSettings.actif && (
              <div style={{...CARD, marginBottom:10, borderColor:"#2A3A26"}}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div style={{ fontSize:12, color:"#C8A87E", fontWeight:600 }}>🚗 Kilométrage journalier</div>
                  <div style={{ fontSize:9, color:"#5A7A5A" }}>{st.kmSettings.cv} CV · {st.kmSettings.prixL}€/L</div>
                </div>
                <DayGrid mi={journalMonth} data={st.dailyKm} onSet={setDayKm} unit="km" color="#C8A87E" isFloat={true}/>
                {monthKmVal > 0 && (
                  <div style={{ marginTop:8, background:"#0A1218", borderRadius:6, padding:"8px 12px", fontSize:10, color:"#4A6A7A", lineHeight:1.9 }}>
                    <div>{monthKmVal.toFixed(1)} km · Barème {st.kmSettings.cv}CV → <strong style={{color:"#C8A87E"}}>{fe2(kmTotalsBareme[journalMonth])}</strong></div>
                    <div>{monthKmVal.toFixed(1)} km · Réel → <strong style={{color:"#A8E4C8"}}>{fe2(kmTotalsReel[journalMonth])}</strong></div>
                  </div>
                )}
              </div>
            )}

            {st.laundrySettings.actif && (st.laundrySettings.mode==="serviette"||st.laundrySettings.mode==="both") && (
              <div style={{...CARD, marginBottom:10, borderColor:"#1E2E3A"}}>
                <div style={{ fontSize:12, color:"#7EA8C8", fontWeight:600, marginBottom:8 }}>🧴 Serviettes / jour</div>
                <DayGrid mi={journalMonth} data={st.dailyTowels} onSet={setDayTowels} unit="serviettes" color="#7EA8C8" isFloat={false}/>
              </div>
            )}

            {st.laundrySettings.actif && (st.laundrySettings.mode==="lessive"||st.laundrySettings.mode==="both") && (
              <div style={{...CARD, borderColor:"#1E2E3A"}}>
                <div style={{ fontSize:12, color:"#9AA8C8", fontWeight:600, marginBottom:8 }}>🧺 Cycles machine / soir</div>
                <DayGrid mi={journalMonth} data={st.dailyLaundry} onSet={setDayLaundry} unit="lessives" color="#9AA8C8" isFloat={false}/>
              </div>
            )}
          </div>
        )}

        {/* ════════ RECETTES ═══════════════════════════════════════════════════ */}
        {view === "recettes" && (
          <div>
            <div style={{ display:"flex", gap:4, marginBottom:14, flexWrap:"wrap" }}>
              {M3.map((m,i)=><button key={i} onClick={()=>setJournalMonth(i)} style={PILL(journalMonth===i)}>{m}</button>)}
            </div>

            {/* KPIs mois sélectionné */}
            {(()=>{
              const rev = buildMonthRevenue(st.dailyRevenue, journalMonth);
              const charges = monthCharges[journalMonth];
              const benef   = rev.total - charges;
              return (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12 }}>
                  <div style={{...CARD, borderColor:"#1A3A2A"}}>
                    <div style={{ fontSize:9, color:"#4A7A9B", textTransform:"uppercase", marginBottom:4 }}>CA {M3[journalMonth]}</div>
                    <div style={{ fontSize:20, color:"#7EC8A4" }}>{fe(rev.total)}</div>
                    <div style={{ fontSize:10, color:"#4A7A9B" }}>{rev.nbPatients} patients</div>
                  </div>
                  <div style={{...CARD, borderColor:"#3A1A1A"}}>
                    <div style={{ fontSize:9, color:"#4A7A9B", textTransform:"uppercase", marginBottom:4 }}>Charges</div>
                    <div style={{ fontSize:20, color:"#E4A8A8" }}>{fe(charges)}</div>
                    <div style={{ fontSize:10, color:"#4A7A9B" }}>{pct(charges,rev.total||1)}% du CA</div>
                  </div>
                  <div style={{...CARD, borderColor:benef>=0?"#1A3A2A":"#3A1A1A"}}>
                    <div style={{ fontSize:9, color:"#4A7A9B", textTransform:"uppercase", marginBottom:4 }}>Bénéfice net</div>
                    <div style={{ fontSize:20, color:benef>=0?"#A8E4C8":"#E4A8A8" }}>{fe(benef)}</div>
                    <div style={{ fontSize:10, color:"#4A7A9B" }}>{pct(benef,rev.total||1)}% de marge</div>
                  </div>
                </div>
              );
            })()}

            {/* Grille recettes */}
            <div style={{...CARD, marginBottom:12}}>
              <div style={{ fontSize:11, color:"#7EC8A4", fontWeight:600, marginBottom:12 }}>
                💰 Honoraires — {MFULL[journalMonth]} {st.workYear}
              </div>
              <p style={{ fontSize:10, color:"#4A6A7A", margin:"0 0 10px", fontStyle:"italic" }}>
                Cliquez sur un jour pour saisir vos recettes. Saisie rapide (nb × tarif) ou détail par acte.
              </p>
              <RevenueGrid mi={journalMonth} dailyRevenue={st.dailyRevenue} onSet={setDayRevenue} revenueTypes={st.revenueTypes}/>
            </div>

            {/* Récap annuel */}
            <div style={{...CARD}}>
              <div style={{ fontSize:9, letterSpacing:2, color:"#6B8EA8", textTransform:"uppercase", marginBottom:12 }}>Récapitulatif annuel {st.workYear}</div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                  <thead>
                    <tr style={{ borderBottom:"1px solid #1E2E3D" }}>
                      {["Mois","CA","Charges","Bénéfice","Patients","Moy./patient"].map(h => (
                        <th key={h} style={{ padding:"6px 8px", textAlign:"right", fontSize:9, color:"#6B8EA8", fontWeight:400, whiteSpace:"nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {Array.from({length:12},(_,mi) => {
                      const rev = buildMonthRevenue(st.dailyRevenue, mi);
                      const ch  = monthCharges[mi];
                      const bn  = rev.total - ch;
                      const hasData = rev.total > 0 || ch > 0;
                      return (
                        <tr key={mi} onClick={()=>setJournalMonth(mi)} style={{ borderBottom:"1px solid #0A1520", cursor:"pointer", background:mi===journalMonth?"#0D1E2A":"transparent" }}>
                          <td style={{ padding:"6px 8px", color:mi===journalMonth?"#7EC8A4":"#C8C4BC", fontWeight:mi===journalMonth?600:400 }}>{M3[mi]}</td>
                          <td style={{ padding:"6px 8px", textAlign:"right", color:"#7EC8A4" }}>{hasData||rev.total>0?fe(rev.total):"—"}</td>
                          <td style={{ padding:"6px 8px", textAlign:"right", color:"#E4A8A8" }}>{fe(ch)}</td>
                          <td style={{ padding:"6px 8px", textAlign:"right", color:bn>=0?"#A8E4C8":"#E4A8A8" }}>{hasData||ch>0?fe(bn):"—"}</td>
                          <td style={{ padding:"6px 8px", textAlign:"right", color:"#A8C8E4" }}>{rev.nbPatients||"—"}</td>
                          <td style={{ padding:"6px 8px", textAlign:"right", color:"#C8A87E" }}>{rev.nbPatients>0?fe(rev.total/rev.nbPatients):"—"}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{ borderTop:"1px solid #2A3845" }}>
                      <td style={{ padding:"8px 8px", fontSize:10, color:"#6B8EA8", fontWeight:600 }}>TOTAL</td>
                      <td style={{ padding:"8px 8px", textAlign:"right", color:"#7EC8A4", fontWeight:600 }}>{fe(annualRevenues)}</td>
                      <td style={{ padding:"8px 8px", textAlign:"right", color:"#E4A8A8", fontWeight:600 }}>{fe(annualCharges)}</td>
                      <td style={{ padding:"8px 8px", textAlign:"right", color:annualBenef>=0?"#A8E4C8":"#E4A8A8", fontWeight:600 }}>{fe(annualBenef)}</td>
                      <td style={{ padding:"8px 8px", textAlign:"right", color:"#A8C8E4", fontWeight:600 }}>{annualPatients}</td>
                      <td style={{ padding:"8px 8px", textAlign:"right", color:"#C8A87E", fontWeight:600 }}>{annualPatients>0?fe(annualRevenues/annualPatients):"—"}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ════════ SAISIE MENSUELLE CHARGES ═══════════════════════════════════ */}
        {view === "monthly" && (
          <div>
            <div style={{ display:"flex", gap:4, marginBottom:14, flexWrap:"wrap" }}>
              {M3.map((m,i)=><button key={i} onClick={()=>setSelectedMonth(i)} style={PILL(selectedMonth===i)}>{m}</button>)}
            </div>
            <div style={{ display:"flex", alignItems:"baseline", gap:12, marginBottom:12 }}>
              <span style={{ fontSize:17, color:"#E8E4DC" }}>{MFULL[selectedMonth]}</span>
              <span style={{ fontSize:20, color:"#E4A8A8" }}>{fe(monthCharges[selectedMonth])}</span>
              <span style={{ fontSize:12, color:"#4A7A9B" }}>charges</span>
            </div>
            {CATEGORIES.map(cat => {
              const active = cat.charges.filter(c => st.charges[c.id]?.enabled);
              if (!active.length) return null;
              return (
                <div key={cat.id} style={{ marginBottom:16 }}>
                  <div style={{ fontSize:9, letterSpacing:3, color:cat.color, textTransform:"uppercase", marginBottom:6 }}>{cat.icon} {cat.label}</div>
                  {active.map(ch => {
                    const isKm   = ch.id === "km_pro";
                    const hasOvr = st.monthlyOverrides[ch.id]?.[selectedMonth] !== undefined;
                    const display= hasOvr ? st.monthlyOverrides[ch.id][selectedMonth] : Math.round(getChargeAmt(ch.id,selectedMonth));
                    return (
                      <div key={ch.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px", marginBottom:3, background:hasOvr?"#0D1F2D":"#121E2B", borderRadius:6, border:hasOvr?"1px solid #2A4A5A":"1px solid transparent" }}>
                        <span style={{ flex:1, fontSize:11, color:"#C8C4BC" }}>{ch.label}</span>
                        {isKm && <span style={{ fontSize:9, color:"#5A7A5A" }}>auto</span>}
                        {!isKm && <span style={{ fontSize:9, color:"#4A7A9B" }}>{st.charges[ch.id].freq==="annual"?"(÷12)":""}</span>}
                        <input type="number" min={0} value={display} disabled={isKm}
                          onChange={e=>updOverride(ch.id,selectedMonth,Number(e.target.value))}
                          style={{...INP, width:78, textAlign:"right", color:hasOvr?"#A8E4C8":"#E8E4DC", background:isKm?"#0A1018":hasOvr?"#162A3A":"#0A1520", border:"1px solid "+(isKm?"#1A2830":hasOvr?"#3A6A8A":"#2A3845"), fontSize:11}}
                        />
                        <span style={{ color:"#4A7A9B", fontSize:10 }}>€</span>
                        {hasOvr && <button onClick={()=>delOverride(ch.id,selectedMonth)} style={{ background:"none", border:"none", color:"#8B3535", cursor:"pointer", fontSize:13, padding:"0" }}>↺</button>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
            {st.laundrySettings.actif && laundryTotals[selectedMonth] > 0 && (
              <div style={{...CARD, borderColor:"#1E2E3A"}}>
                <div style={{ fontSize:9, letterSpacing:2, color:"#3D5A80", textTransform:"uppercase", marginBottom:6 }}>🧺 Linge — part pro calculée</div>
                <div style={{ fontSize:13, color:"#7EA8C8" }}>{fe2(laundryTotals[selectedMonth])}</div>
              </div>
            )}
          </div>
        )}

        {/* ════════ CONFIGURATION ══════════════════════════════════════════════ */}
        {view === "config" && (
          <div>
            {/* Identité */}
            <div style={{...CARD, marginBottom:10}}>
              <div style={SL}>Identité du praticien</div>
              <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                <div style={{ flex:1, minWidth:160 }}>
                  <label style={{ fontSize:10, color:"#6B8EA8", display:"block", marginBottom:4 }}>Nom / prénom</label>
                  <input value={st.praticien} onChange={e=>upd({praticien:e.target.value})} placeholder="Dr. Dupont Marie" style={{...INP, width:"100%", boxSizing:"border-box"}}/>
                </div>
                <div>
                  <label style={{ fontSize:10, color:"#6B8EA8", display:"block", marginBottom:4 }}>Année</label>
                  <input type="number" value={st.workYear} onChange={e=>upd({workYear:Number(e.target.value)})} style={{...INP, width:90}}/>
                </div>
              </div>
            </div>

            {/* Tarifs des actes */}
            <div style={{...CARD, marginBottom:10, borderColor:"#1A3A2A"}}>
              <div style={SL}>💰 Types de recettes & tarifs</div>
              <p style={{ fontSize:10, color:"#4A6A7A", margin:"0 0 10px", fontStyle:"italic" }}>Personnalisez vos tarifs par défaut. Ils seront pré-remplis lors de la saisie journalière.</p>
              {st.revenueTypes.map(rt => (
                <div key={rt.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", borderBottom:"1px solid #0A1520" }}>
                  <span style={{ fontSize:14, width:20 }}>{rt.icon}</span>
                  <span style={{ flex:1, fontSize:11, color:rt.color }}>{rt.label}</span>
                  <input type="number" min={0} step={5} value={rt.tarif} onChange={e=>updRevenueType(rt.id,"tarif",Number(e.target.value))}
                    style={{...INP, width:70, textAlign:"right", fontSize:11}}
                  />
                  <span style={{ fontSize:10, color:"#4A7A9B" }}>€</span>
                </div>
              ))}
            </div>

            {/* Module Km */}
            <div style={{...CARD, marginBottom:10, borderColor:"#2A3A26"}}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <div style={SL}>🚗 Module kilométrique</div>
                <label style={{ display:"flex", alignItems:"center", gap:6, cursor:"pointer" }}>
                  <input type="checkbox" checked={st.kmSettings.actif} onChange={e=>upd({kmSettings:{...st.kmSettings,actif:e.target.checked}})} style={{accentColor:"#7EC8A4"}}/>
                  <span style={{ fontSize:11, color:"#6B8EA8" }}>Actif</span>
                </label>
              </div>
              {st.kmSettings.actif && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  <div>
                    <label style={{ fontSize:10, color:"#6B8EA8", display:"block", marginBottom:4 }}>Puissance fiscale</label>
                    <select value={st.kmSettings.cv} onChange={e=>upd({kmSettings:{...st.kmSettings,cv:Number(e.target.value)}})} style={{...INP, width:"100%"}}>
                      {[3,4,5,6,7].map(cv=><option key={cv} value={cv}>{cv} CV — {BAREME_KM.find(b=>b.cv===cv).t1.toFixed(3)} €/km</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize:10, color:"#C8A87E", display:"block", marginBottom:4 }}>Prix du litre (€)</label>
                    <input type="number" step={0.01} value={st.kmSettings.prixL} onChange={e=>upd({kmSettings:{...st.kmSettings,prixL:parseFloat(e.target.value)}})} style={{...INP, width:"100%"}}/>
                  </div>
                  <div>
                    <label style={{ fontSize:10, color:"#C8A87E", display:"block", marginBottom:4 }}>Consommation (L/100 km)</label>
                    <input type="number" step={0.1} value={st.kmSettings.conso} onChange={e=>upd({kmSettings:{...st.kmSettings,conso:parseFloat(e.target.value)}})} style={{...INP, width:"100%"}}/>
                  </div>
                  <div style={{ background:"#0A1218", borderRadius:6, padding:"8px 10px", fontSize:10, color:"#4A6A7A" }}>
                    <div style={{color:"#C8A87E"}}>Barème auto (cumul annuel)</div>
                    <div>Réel : {fn2((st.kmSettings.conso/100)*st.kmSettings.prixL)} €/km</div>
                  </div>
                </div>
              )}
            </div>

            {/* Module Linge */}
            <div style={{...CARD, marginBottom:10, borderColor:"#1E2E3A"}}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <div style={SL}>🧺 Module linge & serviettes</div>
                <label style={{ display:"flex", alignItems:"center", gap:6, cursor:"pointer" }}>
                  <input type="checkbox" checked={st.laundrySettings.actif} onChange={e=>upd({laundrySettings:{...st.laundrySettings,actif:e.target.checked}})} style={{accentColor:"#7EC8A4"}}/>
                  <span style={{ fontSize:11, color:"#6B8EA8" }}>Actif</span>
                </label>
              </div>
              {st.laundrySettings.actif && (
                <>
                  <div style={{ display:"flex", gap:6, marginBottom:10 }}>
                    {[{k:"both",l:"Les deux"},{k:"serviette",l:"Serviettes"},{k:"lessive",l:"Cycles"}].map(o=>(
                      <button key={o.k} onClick={()=>upd({laundrySettings:{...st.laundrySettings,mode:o.k}})} style={PILL(st.laundrySettings.mode===o.k)}>{o.l}</button>
                    ))}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                    <div>
                      <label style={{ fontSize:10, color:"#7EA8C8", display:"block", marginBottom:4 }}>Coût serviette (€)</label>

<!-- ═══ PWA LOGIC — JS pur, HORS Babel, exécuté après le DOM ════════════════
  Séparé du bloc Babel pour s'exécuter IMMÉDIATEMENT sans attendre la
  compilation JSX. Gère : SW, install prompt, Brave/Firefox fallback.
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  var deferredPrompt  = null;
  var bannerShown     = false;
  var innerEl         = document.getElementById('pwa-banner-inner');
  var bannerEl        = document.getElementById('pwa-banner');
  var installBtn      = document.getElementById('pwa-install-btn');
  var dismissBtn      = document.getElementById('pwa-dismiss-btn');

  // ────────────────────────────────────────────────────────────────────────────
  // 1. SERVICE WORKER
  // ────────────────────────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js', { scope: '/' })
        .then(function (reg) {
          console.log('[Osteopathie SW] OK — scope:', reg.scope);
          // Forcer la mise à jour si nouvelle version disponible
          reg.addEventListener('updatefound', function () {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function () {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[Osteopathie SW] Nouvelle version disponible');
              }
            });
          });
        })
        .catch(function (err) { console.warn('[Osteopathie SW] Erreur:', err); });
    });
  }

  // ────────────────────────────────────────────────────────────────────────────
  // 2. DÉTECTION NAVIGATEUR
  // ────────────────────────────────────────────────────────────────────────────
  function detectBrowser() {
    var ua = navigator.userAgent;
    if (/brave/i.test(ua) || (navigator.brave && navigator.brave.isBrave)) return 'brave';
    if (/firefox|fxios/i.test(ua)) return 'firefox';
    if (/samsung/i.test(ua)) return 'samsung';
    if (/chrome|crios/i.test(ua) && !/edg/i.test(ua)) return 'chrome';
    if (/edg/i.test(ua)) return 'edge';
    if (/safari/i.test(ua) && !/chrome/i.test(ua)) return 'safari';
    return 'other';
  }

  function isStandaloneMode() {
    return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true
        || document.referrer.includes('android-app://');
  }

  // ────────────────────────────────────────────────────────────────────────────
  // 3. AFFICHAGE / MASQUAGE BANNIÈRE
  // ────────────────────────────────────────────────────────────────────────────
  function showBanner(mode) {
    if (bannerShown || isStandaloneMode()) return;
    var dismissed = localStorage.getItem('pwa_dismissed_at');
    if (dismissed) {
      var daysSince = (Date.now() - parseInt(dismissed, 10)) / (1000 * 60 * 60 * 24);
      if (daysSince < 7) return;
    }
    bannerShown = true;
    bannerEl.style.display = 'block';

    // Adapter le texte selon le navigateur
    if (mode === 'manual') {
      var browser = detectBrowser();
      var instructions = {
        firefox:  'Menu ⋮ → "Ajouter à l\'écran d\'accueil"',
        brave:    'Menu ⋮ → "Ajouter à l\'écran d\'accueil"',
        samsung:  'Menu ⋮ → "Ajouter page à" → "Écran d\'accueil"',
        safari:   'Bouton Partager → "Sur l\'écran d\'accueil"',
        default:  'Menu ⋮ → "Installer l\'application"',
      };
      var instr = instructions[browser] || instructions.default;
      var descEl = bannerEl.querySelector('#pwa-banner-inner div:nth-child(2) div:last-child');
      if (descEl) descEl.textContent = instr;
      if (installBtn) {
        installBtn.textContent = 'Comment installer';
        installBtn.onclick = function () {
          hideBanner();
          alert('Pour installer Osteopathie :\n\n' + instr + '\n\nL\'app fonctionnera hors-ligne et apparaîtra sur votre écran d\'accueil.');
        };
      }
    }

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (innerEl) innerEl.style.transform = 'translateY(0)';
      });
    });
  }

  function hideBanner() {
    if (innerEl) innerEl.style.transform = 'translateY(110%)';
    setTimeout(function () {
      bannerEl.style.display = 'none';
      bannerShown = false;
    }, 380);
  }

  // ────────────────────────────────────────────────────────────────────────────
  // 4. beforeinstallprompt — Chrome, Edge, Samsung Browser, Opera
  //    NB : Brave bloque cet événement dans certaines versions mais on gère
  //    le fallback ci-dessous.
  // ────────────────────────────────────────────────────────────────────────────
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferredPrompt = e;
    console.log('[Osteopathie PWA] beforeinstallprompt capturé');
    showBanner('native');
  });

  // Bouton Installer (mode natif Chrome/Edge)
  if (installBtn) {
    installBtn.addEventListener('click', function () {
      if (deferredPrompt) {
        hideBanner();
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function (result) {
          console.log('[Osteopathie PWA] Choix:', result.outcome);
          deferredPrompt = null;
        });
      }
    });
  }

  // Bouton Fermer
  if (dismissBtn) {
    dismissBtn.addEventListener('click', function () {
      hideBanner();
      localStorage.setItem('pwa_dismissed_at', Date.now().toString());
    });
  }

  // Succès installation
  window.addEventListener('appinstalled', function () {
    hideBanner();
    deferredPrompt = null;
    localStorage.removeItem('pwa_dismissed_at');
    console.log('[Osteopathie PWA] Installée avec succès !');
  });

  // ────────────────────────────────────────────────────────────────────────────
  // 5. FALLBACK Brave / Firefox / autres navigateurs qui ignorent
  //    beforeinstallprompt : afficher la bannière après 3 secondes si
  //    l'app n'est pas déjà installée et pas en mode standalone.
  // ────────────────────────────────────────────────────────────────────────────
  window.addEventListener('load', function () {
    if (isStandaloneMode()) {
      console.log('[Osteopathie PWA] Déjà installée — mode standalone');
      return;
    }
    var browser = detectBrowser();
    console.log('[Osteopathie PWA] Navigateur:', browser, '| HTTPS:', location.protocol === 'https:');

    // Si pas de prompt natif après 3.5s → afficher bannière manuelle
    setTimeout(function () {
      if (!deferredPrompt && !bannerShown) {
        showBanner('manual');
      }
    }, 3500);
  });

  // ────────────────────────────────────────────────────────────────────────────
  // 6. BOUTON "Installer l'app" dans le header React
  //    On expose une fonction globale que le composant React peut appeler
  // ────────────────────────────────────────────────────────────────────────────
  window.__pwa_triggerInstall = function () {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function (r) { deferredPrompt = null; });
    } else {
      showBanner('manual');
    }
  };

  window.__pwa_isInstalled = function () { return isStandaloneMode(); };

})();
</script>
</body>
</html>
